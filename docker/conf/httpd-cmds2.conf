# CMDS2 Apache Configuration — Firmware Image HTTP Server
#
# Serves IOS-XE firmware images from /var/lib/tftpboot/images/ so that
# Catalyst switches can fetch firmware via HTTP during upgrade workflows.

# Port 80 is already defined in httpd.conf — do not duplicate Listen directive

<VirtualHost *:80>
    ServerName cmds2-server

    # Firmware images directory
    Alias /images /var/lib/tftpboot/images
    <Directory /var/lib/tftpboot/images>
        Options +Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Backup configs (read-only browse)
    Alias /mig /var/lib/tftpboot/mig
    <Directory /var/lib/tftpboot/mig>
        Options +Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Root serves a simple status page
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        Require all granted
    </Directory>

    # Logging
    ErrorLog /dev/stderr
    CustomLog /dev/stdout combined
</VirtualHost>
